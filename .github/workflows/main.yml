name: Ruby

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.0", "3.2", "3.3", "3.4"]
        puma: ["8.0.2"]
        rails: ["7.0.10", "7.1.6", "7.2.2"]
        exclude:
          - ruby: "3.0"
            rails: "7.2.2"
    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }} / Puma ${{ matrix.puma }}
    steps:
      - uses: actions/checkout@v4
      - name: Run specs in Docker
        env:
          PUMA_VERSION: ${{ matrix.puma }}
          RAILS_VERSION: ${{ matrix.rails }}
        run: |
          docker build \
            --build-arg RUBY_VERSION=${{ matrix.ruby }} \
            -t puma-enhanced-stats:ci \
            .
          docker run --rm \
            -e PUMA_VERSION="${PUMA_VERSION}" \
            -e RAILS_VERSION="${RAILS_VERSION}" \
            puma-enhanced-stats:ci \
            bundle exec rake
