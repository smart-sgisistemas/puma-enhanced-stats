name: Ruby

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.0", "3.2", "3.3"]
        puma: ["6.4.3", "7.0.4", "8.0.2"]
    name: Ruby ${{ matrix.ruby }} / Puma ${{ matrix.puma }}
    steps:
      - uses: actions/checkout@v4
      - name: Run specs in Docker
        env:
          PUMA_VERSION: ${{ matrix.puma }}
        run: |
          docker build \
            --build-arg RUBY_VERSION=${{ matrix.ruby }} \
            -t puma-enhanced-stats:ci \
            .
          docker run --rm \
            -e PUMA_VERSION="${PUMA_VERSION}" \
            puma-enhanced-stats:ci \
            bundle exec rake
